<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>แอปเจ้าหน้าที่เยี่ยมบ้าน</title>
<style>
:root{
  --bg:#f5f3ef;--surface:#fff;--surface2:#faf9f7;--border:#d8d2c8;
  --primary:#1a5f7a;--primary-dk:#134a5f;--primary-lt:#e8f4f8;
  --ok:#166534;--ok-bg:#dcfce7;--warn:#92400e;--warn-bg:#fef3c7;--err:#991b1b;--err-bg:#fee2e2;
  --text:#1e293b;--sub:#64748b;--r:12px;--r-lg:18px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,"Segoe UI",Tahoma,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
.top{background:linear-gradient(135deg,var(--primary-dk),var(--primary));color:#fff;padding:16px 18px;text-align:center;position:relative}
.top h1{font-size:16px;font-weight:700}
.top .sub{font-size:12px;opacity:.85;margin-top:2px}
.gps-dot{position:absolute;top:16px;right:16px;display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700}
.dot{width:8px;height:8px;border-radius:50%;background:#94a3b8}
.dot.live{background:#22c55e;box-shadow:0 0 0 4px rgba(34,197,94,.25);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 4px rgba(34,197,94,.25)}50%{box-shadow:0 0 0 8px rgba(34,197,94,.08)}}
main{flex:1;padding:16px;max-width:480px;margin:0 auto;width:100%}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;margin-bottom:14px}
.staff-card{display:flex;align-items:center;gap:12px}
.avatar{width:44px;height:44px;border-radius:50%;background:var(--primary-lt);color:var(--primary);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:17px;flex-shrink:0}
.staff-name{font-weight:700;font-size:15px}
.staff-pos{font-size:12px;color:var(--sub)}
.logout{margin-left:auto;font-size:11px;color:var(--sub);border:1px solid var(--border);border-radius:8px;padding:6px 10px;background:var(--surface2)}
h2{font-size:14px;font-weight:700;margin-bottom:10px;color:var(--primary-dk)}
.scan-btn{width:100%;background:var(--primary);color:#fff;border:none;border-radius:var(--r);padding:16px;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px}
.scan-btn:active{transform:scale(.98)}
.scan-btn.secondary{background:var(--surface2);color:var(--primary-dk);border:1.5px solid var(--border)}
#video-wrap{display:none;position:fixed;inset:0;background:#000;z-index:50;flex-direction:column}
#video-wrap.on{display:flex}
#video{flex:1;object-fit:cover;width:100%}
.scan-frame{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:70%;max-width:280px;aspect-ratio:1;border:3px solid #fff;border-radius:16px;box-shadow:0 0 0 2000px rgba(0,0,0,.45)}
.cam-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:50%;width:40px;height:40px;font-size:18px;z-index:5}
.cam-hint{position:absolute;bottom:40px;left:0;right:0;text-align:center;color:#fff;font-size:13px;opacity:.85}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:600;z-index:100;max-width:90%;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.25)}
.toast.ok{background:var(--ok-bg);color:var(--ok)}
.toast.warn{background:var(--warn-bg);color:var(--warn)}
.toast.err{background:var(--err-bg);color:var(--err)}
.result-box{border-radius:var(--r);padding:14px;margin-top:10px;font-size:13px;line-height:1.6}
.result-box.ok{background:var(--ok-bg);color:var(--ok)}
.result-box.warn{background:var(--warn-bg);color:var(--warn)}
.field{margin-bottom:12px}
label{font-size:12px;font-weight:700;color:var(--sub);display:block;margin-bottom:5px}
textarea,input[type=text]{width:100%;border:1.5px solid var(--border);border-radius:var(--r);padding:10px 12px;font-size:14px;font-family:inherit}
textarea{resize:vertical;min-height:60px}
.house-info{background:var(--primary-lt);border-radius:var(--r);padding:12px 14px;margin-bottom:12px}
.house-info b{color:var(--primary-dk)}
.muted{color:var(--sub);font-size:12px;text-align:center;padding:20px}
</style>
</head>
<body>

<div class="top">
  <h1>🏠 แอปเจ้าหน้าที่เยี่ยมบ้าน</h1>
  <div class="sub" id="orgLine">ระบบเยี่ยมบ้าน GPS/GIS</div>
  <div class="gps-dot"><span class="dot" id="gpsDot"></span><span id="gpsLabel">ไม่ได้เชื่อมตำแหน่ง</span></div>
</div>

<main>
  <div id="loginSection" class="card">
    <h2>เข้าสู่ระบบเจ้าหน้าที่</h2>
    <p class="muted" style="padding:0 0 12px;text-align:left">สแกน QR ประจำตัวเจ้าหน้าที่ของคุณเพื่อเริ่มปฏิบัติงาน</p>
    <button class="scan-btn" onclick="startScan('staff')">📷 สแกน QR เจ้าหน้าที่</button>
  </div>

  <div id="staffSection" style="display:none">
    <div class="card staff-card">
      <div class="avatar" id="avatarInit">A</div>
      <div>
        <div class="staff-name" id="staffName">–</div>
        <div class="staff-pos" id="staffPos">–</div>
      </div>
      <button class="logout" onclick="logout()">ออกจากระบบ</button>
    </div>

    <div class="card">
      <h2>เยี่ยมบ้าน</h2>
      <button class="scan-btn" onclick="startScan('house')">📷 สแกน QR บ้านที่เยี่ยม</button>
      <div id="visitResult"></div>
    </div>
  </div>
</main>

<div id="video-wrap">
  <button class="cam-close" onclick="closeCamera()">✕</button>
  <video id="video" playsinline autoplay muted></video>
  <div class="scan-frame"></div>
  <div class="cam-hint" id="camHint">วางกล้องให้เห็น QR Code ในกรอบ</div>
  <canvas id="canvas" style="display:none"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
// ⚙️ ตั้งค่า: ใส่ URL ของ GAS Web App ที่ deploy แล้ว
// ═══════════════════════════════════════════════════════════════
const WEB_APP_URL = "https://script.google.com/macros/s/YOUR_DEPLOYMENT_ID/exec";
const LOCATION_INTERVAL_MS = 15000; // ส่งพิกัดทุก 15 วิ

let staffId = localStorage.getItem("hv_staffId") || "";
let staffName = localStorage.getItem("hv_staffName") || "";
let staffPos = localStorage.getItem("hv_staffPos") || "";
let scanMode = null; // 'staff' | 'house'
let stream = null, rafId = null;
let watchId = null, locTimer = null;
let lastLat = null, lastLng = null;

function toast(msg, type){
  const t = document.createElement("div");
  t.className = "toast" + (type ? " " + type : "");
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3200);
}

async function callApi(payload){
  const res = await fetch(WEB_APP_URL, {
    method: "POST",
    body: JSON.stringify(payload)
  });
  return res.json();
}

// ── UI state ──────────────────────────────────────
function renderLoggedIn(){
  document.getElementById("loginSection").style.display = "none";
  document.getElementById("staffSection").style.display = "block";
  document.getElementById("staffName").textContent = staffName;
  document.getElementById("staffPos").textContent = staffPos || "เจ้าหน้าที่เยี่ยมบ้าน";
  document.getElementById("avatarInit").textContent = staffName.charAt(0) || "A";
  startLocationTracking();
}
function logout(){
  stopLocationTracking();
  callApi({ action:"staffOffline", staffId }).catch(()=>{});
  localStorage.removeItem("hv_staffId");
  localStorage.removeItem("hv_staffName");
  localStorage.removeItem("hv_staffPos");
  staffId = ""; staffName = ""; staffPos = "";
  document.getElementById("loginSection").style.display = "block";
  document.getElementById("staffSection").style.display = "none";
}
if (staffId) renderLoggedIn();

// ── GPS tracking ──────────────────────────────────
function startLocationTracking(){
  if (!navigator.geolocation) { toast("อุปกรณ์นี้ไม่รองรับ GPS","err"); return; }
  const dot = document.getElementById("gpsDot"), label = document.getElementById("gpsLabel");
  watchId = navigator.geolocation.watchPosition(pos=>{
    lastLat = pos.coords.latitude; lastLng = pos.coords.longitude;
    dot.classList.add("live"); label.textContent = "กำลังส่งตำแหน่งสด";
  }, err=>{
    label.textContent = "ไม่สามารถอ่านตำแหน่งได้";
  }, { enableHighAccuracy:true, maximumAge:5000, timeout:10000 });

  sendLocation();
  locTimer = setInterval(sendLocation, LOCATION_INTERVAL_MS);
}
function stopLocationTracking(){
  if (watchId) navigator.geolocation.clearWatch(watchId);
  if (locTimer) clearInterval(locTimer);
  document.getElementById("gpsDot").classList.remove("live");
  document.getElementById("gpsLabel").textContent = "ไม่ได้เชื่อมตำแหน่ง";
}
async function sendLocation(){
  if (lastLat === null || !staffId) return;
  try { await callApi({ action:"updateLocation", staffId, lat:lastLat, lng:lastLng, accuracy:0 }); }
  catch(e){ /* เงียบไว้ ลองใหม่รอบถัดไป */ }
}

// ── QR camera scan (jsQR) ────────────────────────
async function startScan(mode){
  scanMode = mode;
  document.getElementById("camHint").textContent = mode === "staff"
    ? "สแกน QR ประจำตัวเจ้าหน้าที่"
    : "สแกน QR ติดหน้าบ้านที่จะเยี่ยม";
  document.getElementById("video-wrap").classList.add("on");
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
    const video = document.getElementById("video");
    video.srcObject = stream;
    await video.play();
    tickScan();
  } catch(e) {
    toast("ไม่สามารถเปิดกล้องได้: " + e.message, "err");
    closeCamera();
  }
}
function closeCamera(){
  if (rafId) cancelAnimationFrame(rafId);
  if (stream) stream.getTracks().forEach(t=>t.stop());
  document.getElementById("video-wrap").classList.remove("on");
}
function tickScan(){
  const video = document.getElementById("video"), canvas = document.getElementById("canvas");
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(img.data, img.width, img.height, { inversionAttempts:"dontInvert" });
    if (code) { if (navigator.vibrate) navigator.vibrate(80); onScanResult(code.data); return; }
  }
  rafId = requestAnimationFrame(tickScan);
}

async function onScanResult(text){
  closeCamera();
  if (scanMode === "staff") {
    if (!text.startsWith("STAFF:")) { toast("นี่ไม่ใช่ QR เจ้าหน้าที่","err"); return; }
    const id = text.split(":")[1];
    const r = await callApi({ action:"getStaff", staffId:id });
    if (r.status !== "ok") { toast(r.message,"err"); return; }
    staffId = r.staffId; staffName = r.name; staffPos = r.position;
    localStorage.setItem("hv_staffId", staffId);
    localStorage.setItem("hv_staffName", staffName);
    localStorage.setItem("hv_staffPos", staffPos);
    toast("เข้าสู่ระบบสำเร็จ: " + staffName, "ok");
    renderLoggedIn();
  } else if (scanMode === "house") {
    if (!text.startsWith("HOME:")) { toast("นี่ไม่ใช่ QR บ้าน","err"); return; }
    const houseId = text.split(":")[1];
    const info = await callApi({ action:"getHouse", houseId });
    if (info.status !== "ok") { toast(info.message,"err"); return; }
    showVisitConfirm(houseId, info);
  }
}

function showVisitConfirm(houseId, info){
  const box = document.getElementById("visitResult");
  box.innerHTML =
    '<div class="house-info"><b>' + info.name + '</b><br>' + info.address +
    (info.category ? '<br>กลุ่ม: ' + info.category : '') + '</div>' +
    '<div class="field"><label>บันทึกเพิ่มเติม (ถ้ามี)</label><textarea id="visitNote" placeholder="เช่น อาการ, สิ่งที่แนะนำ..."></textarea></div>' +
    '<button class="scan-btn" onclick="confirmVisit(\'' + houseId + '\')">✅ ยืนยันบันทึกการเยี่ยม</button>';
}

async function confirmVisit(houseId){
  if (lastLat === null) { toast("กำลังรอสัญญาณ GPS กรุณารอสักครู่แล้วลองใหม่","warn"); return; }
  const note = document.getElementById("visitNote").value;
  const r = await callApi({ action:"visitCheckin", staffId, houseId, lat:lastLat, lng:lastLng, note });
  const box = document.getElementById("visitResult");
  if (r.status === "ok") {
    box.innerHTML = '<div class="result-box ' + (r.warning ? "warn" : "ok") + '">' +
      (r.warning ? "⚠️ " : "✅ ") + r.message + '</div>';
    toast(r.message, r.warning ? "warn" : "ok");
  } else {
    box.innerHTML = '<div class="result-box warn">❌ ' + r.message + '</div>';
    toast(r.message, "err");
  }
}
</script>
</body>
</html>
