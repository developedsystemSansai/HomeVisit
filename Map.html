<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>แผนที่เยี่ยมบ้านเรียลไทม์</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root{
  --bg:#f5f3ef;--surface:#fff;--border:#d8d2c8;
  --primary:#1a5f7a;--primary-dk:#134a5f;--primary-lt:#e8f4f8;
  --ok:#16a34a;--warn:#f59e0b;--sub:#64748b;--text:#1e293b;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"Segoe UI",Tahoma,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}
header{background:linear-gradient(135deg,var(--primary-dk),var(--primary));color:#fff;padding:12px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
header h1{font-size:15px;font-weight:700}
.stats{display:flex;gap:10px;margin-left:auto;flex-wrap:wrap}
.stat{background:rgba(255,255,255,.12);border-radius:10px;padding:6px 12px;font-size:12px;text-align:center;min-width:64px}
.stat b{display:block;font-size:16px}
.live-badge{display:flex;align-items:center;gap:5px;font-size:11px;background:rgba(255,255,255,.15);padding:5px 10px;border-radius:20px}
.live-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(74,222,128,.3)}50%{box-shadow:0 0 0 6px rgba(74,222,128,.05)}}
.wrap{flex:1;display:flex;overflow:hidden}
#map{flex:1}
.legend{position:absolute;bottom:20px;left:20px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 14px;font-size:12px;z-index:500;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.legend .row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.legend .row:last-child{margin:0}
.sw{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.staff-marker{background:#2563eb;color:#fff;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:15px;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.staff-marker.stale{background:#94a3b8}
.house-marker{width:22px;height:22px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3)}
.house-marker.visited{background:#16a34a}
.house-marker.pending{background:#dc2626}
.leaflet-popup-content{font-size:13px;line-height:1.6}
</style>
</head>
<body>

<header>
  <h1>🗺️ แผนที่เยี่ยมบ้านเรียลไทม์</h1>
  <div class="live-badge"><span class="live-dot"></span> อัพเดทอัตโนมัติทุก 10 วิ</div>
  <div class="stats">
    <div class="stat"><b id="kpiTotal">–</b>บ้านทั้งหมด</div>
    <div class="stat"><b id="kpiVisited">–</b>เยี่ยมแล้ว</div>
    <div class="stat"><b id="kpiPending">–</b>ยังไม่เยี่ยม</div>
    <div class="stat"><b id="kpiStaff">–</b>จนท.ออกปฏิบัติงาน</div>
  </div>
</header>

<div class="wrap">
  <div id="map"></div>
  <div class="legend">
    <div class="row"><span class="sw" style="background:#2563eb;border-radius:50%"></span> เจ้าหน้าที่ (สด)</div>
    <div class="row"><span class="sw" style="background:#94a3b8;border-radius:50%"></span> เจ้าหน้าที่ (ไม่ได้อัพเดทนาน)</div>
    <div class="row"><span class="sw" style="background:#16a34a"></span> บ้านที่เยี่ยมแล้ว</div>
    <div class="row"><span class="sw" style="background:#dc2626"></span> บ้านที่ยังไม่เยี่ยม</div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
// ⚙️ ตั้งค่า: ใส่ URL ของ GAS Web App ที่ deploy แล้ว
// ═══════════════════════════════════════════════════════════════
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx40rD6x5FRcVKVb1oRka-24lrXU1mdQrdKlDQVJvtsW49qbk5UaenFxDOQF2mTNgf8Bw/exec";
const POLL_MS = 10000;
const STALE_MINUTES = 10;

const map = L.map('map').setView([18.7883, 98.9853], 13); // ปรับพิกัดเริ่มต้นเป็นพื้นที่ของหน่วยงาน
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors',
  maxZoom: 19
}).addTo(map);

let staffMarkers = {}, houseMarkers = {};
let firstLoad = true;

function staffIcon(stale){
  return L.divIcon({ className:'', html:'<div class="staff-marker' + (stale?' stale':'') + '">🚶</div>', iconSize:[34,34], iconAnchor:[17,17] });
}
function houseIcon(visited){
  return L.divIcon({ className:'', html:'<div class="house-marker ' + (visited?'visited':'pending') + '"></div>', iconSize:[22,22], iconAnchor:[11,20] });
}

function isStale(updatedStr){
  // updatedStr เป็นรูปแบบ dd/MM/yyyy HH:mm:ss (Asia/Bangkok)
  if (!updatedStr) return true;
  const parts = updatedStr.split(/[\/\s:]/);
  if (parts.length < 6) return true;
  const d = new Date(parts[2], parts[1]-1, parts[0], parts[3], parts[4], parts[5]);
  return (Date.now() - d.getTime()) > STALE_MINUTES*60*1000;
}

async function refresh(){
  try {
    const res = await fetch(WEB_APP_URL, { method:"POST", body: JSON.stringify({ action:"getMapData" }) });
    const data = await res.json();

    document.getElementById("kpiTotal").textContent = data.houses.length;
    const visitedCount = data.houses.filter(h=>h.status==="เยี่ยมแล้ว").length;
    document.getElementById("kpiVisited").textContent = visitedCount;
    document.getElementById("kpiPending").textContent = data.houses.length - visitedCount;
    document.getElementById("kpiStaff").textContent = data.staff.filter(s=>!isStale(s.updated)).length;

    const seenStaff = {};
    data.staff.forEach(s=>{
      seenStaff[s.staffId] = true;
      const stale = isStale(s.updated);
      const ll = [s.lat, s.lng];
      if (staffMarkers[s.staffId]) {
        staffMarkers[s.staffId].setLatLng(ll).setIcon(staffIcon(stale));
      } else {
        staffMarkers[s.staffId] = L.marker(ll, { icon: staffIcon(stale) }).addTo(map);
      }
      staffMarkers[s.staffId].bindPopup(
        '<b>' + s.name + '</b><br>' + (s.position||'') +
        '<br>เยี่ยมวันนี้: ' + (s.todayCount||0) + ' หลัง' +
        '<br>อัพเดทล่าสุด: ' + s.updated
      );
    });
    Object.keys(staffMarkers).forEach(id=>{ if(!seenStaff[id]){ map.removeLayer(staffMarkers[id]); delete staffMarkers[id]; } });

    const seenHouse = {};
    data.houses.forEach(h=>{
      seenHouse[h.houseId] = true;
      const visited = h.status === "เยี่ยมแล้ว";
      const ll = [h.lat, h.lng];
      if (houseMarkers[h.houseId]) {
        houseMarkers[h.houseId].setLatLng(ll).setIcon(houseIcon(visited));
      } else {
        houseMarkers[h.houseId] = L.marker(ll, { icon: houseIcon(visited) }).addTo(map);
      }
      houseMarkers[h.houseId].bindPopup(
        '<b>' + h.name + '</b><br>' + h.address +
        (h.category ? '<br>กลุ่ม: ' + h.category : '') +
        '<br>สถานะ: ' + h.status +
        (h.lastVisit ? '<br>เยี่ยมล่าสุด: ' + h.lastVisit + (h.lastStaff?' โดย '+h.lastStaff:'') : '')
      );
    });
    Object.keys(houseMarkers).forEach(id=>{ if(!seenHouse[id]){ map.removeLayer(houseMarkers[id]); delete houseMarkers[id]; } });

    if (firstLoad) {
      const all = [...data.staff.map(s=>[s.lat,s.lng]), ...data.houses.map(h=>[h.lat,h.lng])];
      if (all.length) map.fitBounds(all, { padding:[40,40] });
      firstLoad = false;
    }
  } catch(e) {
    console.error("refresh error", e);
  }
}

refresh();
setInterval(refresh, POLL_MS);
</script>
</body>
</html>
